server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/SambhavSharmaz/Finflow-Config-Server.git
          clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:9090}/eureka/
  instance:
    prefer-ip-address: true
